  <style>
    :root{

      --card:#fffdf8; --soft:#efe6d7; --accent:#2f5d50; --accent-2:#b9653b;
      --kw-bg:#fff1b8; --kw-txt:#735000;
      --active-bg:#2f5d50; --active-txt:#ffffff;
      --focus-outline:rgba(47,93,80,.2);
    }
    body{
      margin:0; background:
        linear-gradient(180deg, #fbf8f1 0%, var(--bg) 320px, #f7f5ef 100%);
      color:var(--txt);
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, "PingFang SC","Microsoft YaHei", Arial;
    }
    .wrap{ max-width:1440px; margin:18px auto; padding:0 16px 22px; }
    .topbar{
      background:var(--card); border:1px solid var(--bd); border-radius:14px;
      padding:14px; display:grid; grid-template-columns:minmax(260px, 1fr) auto; gap:12px; align-items:center;
      position:sticky; top:10px; z-index:10;
      box-shadow:0 14px 35px rgba(55,48,35,0.08);
    }
    .title{ font-size:20px; font-weight:800; letter-spacing:0; }
    .sub{ font-size:13px; color:var(--muted); margin-top:4px; line-height:1.45; }
    .right{ display:flex; gap:8px; align-items:center; flex-wrap:wrap; justify-content:flex-end; }
    .pill{
      border:1px solid var(--bd); background:#fff; color:var(--txt);
      padding:8px 11px; border-radius:999px; font-size:13px; cursor:pointer; user-select:none;
      font-family:inherit; line-height:1; appearance:none; -webkit-appearance:none;
    }
    .pill:active{ transform:translateY(1px); }
    .pill:focus-visible, .searchbox input:focus-visible, .icon-btn:focus-visible{ outline:2px solid rgba(47,93,80,.28); outline-offset:2px; }
    .pill.primary{ background:var(--accent); color:#fff; border-color:var(--accent); }
    .searchbox{
      display:flex; align-items:center; gap:6px; min-width:260px; flex:1 1 280px;
      border:1px solid var(--bd); background:#fff; border-radius:999px; padding:4px 6px 4px 12px;
    }
    .searchbox input{
      width:100%; min-width:120px; border:0; outline:0; font:inherit; font-size:13px;
      background:transparent; color:var(--txt);
    }
    .searchbox input::placeholder{ color:#9a9387; }
    .icon-btn{
      width:28px; height:28px; border:0; border-radius:999px; background:var(--soft);
      color:var(--muted); cursor:pointer; line-height:1; font:inherit;
    }
    .scroll{ overflow:auto; border-radius:14px; margin-top:12px; max-height: calc(100vh - 122px); border:1px solid var(--bd); background:var(--card); box-shadow:0 10px 26px rgba(55,48,35,0.05); }
    .scroll-hint{ display:none; color:var(--muted); font-size:12px; margin:8px 2px 0; }
    table{
      width:100%; border-collapse:separate; border-spacing:0;
      background:var(--card); border:none; border-radius:14px; overflow:hidden;
      min-width:1120px;
    }
    caption{
      caption-side:top;
      text-align:left;
      padding:11px 12px;
      color:var(--muted);
      font-size:12px;
    }
    th, td{
      border-bottom:1px solid var(--bd);
      border-right:1px solid var(--bd);
      padding:11px 10px;
      vertical-align:top;
      font-size:13px;
    }
    th{
      background:#f1eadf; font-weight:800; text-align:left; white-space:nowrap;
      position:sticky; top:0; z-index:2;
    }
    th.sticky-left{
      left:0; z-index:3; position:sticky;
      box-shadow: 1px 0 0 rgba(229,231,235,1);
    }
    td:first-child, th.sticky-left{ background:#f1eadf; }
    tr:last-child td{ border-bottom:none; }
    th:last-child, td:last-child{ border-right:none; }

    .cell{ display:flex; flex-direction:column; gap:8px; min-height:62px; }
    .items{ display:flex; flex-direction:column; gap:6px; }
    .item{
      line-height:1.55;
      padding:8px 10px;
      border:1px solid var(--bd);
      border-radius:12px;
      background:#fff;
    }
    .item.empty{ color:var(--muted); }
    .kw{
      background:var(--kw-bg);
      color:var(--kw-txt);
      padding:1px 4px;
      border-radius:6px;
      cursor:pointer;
      border:none;
      font:inherit;
      line-height:inherit;
      box-decoration-break: clone;
      -webkit-box-decoration-break: clone;
    }
    .kw:hover{ filter:brightness(0.98); }
    .kw:focus-visible{ outline:2px solid rgba(47,93,80,.38); outline-offset:1px; }
    .kw.active{ background:var(--active-bg); color:var(--active-txt); }
    .kw.weak{ background:#e8e2d8; color:#514b42; }

    td.dim{ background:#fafafa; }
    td.dim .cell{ opacity:0.18; filter: grayscale(1); transition: opacity .15s ease; }
    td.focus .cell{ outline:2px solid var(--focus-outline); outline-offset:2px; border-radius:10px; }
    td.focus-weak .cell{ outline:2px dashed rgba(47,93,80,.18); outline-offset:2px; border-radius:10px; }
    td.search-hit .cell{ box-shadow:inset 0 0 0 2px rgba(185,101,59,.34); border-radius:10px; }
    .reason{
      display:none; margin-top:2px; color:var(--accent); font-size:11px; line-height:1.35;
      background:#edf5f1; border:1px solid rgba(47,93,80,.18); border-radius:8px; padding:5px 7px;
    }
    td.focus .reason, td.focus-weak .reason{ display:block; }
    .legend{ font-size:12px; color:var(--muted); }
  
    .layout{ display:flex; gap:12px; align-items:flex-start; }
    .sidebar{
      width:260px; flex:0 0 260px;
      background:var(--card); border:1px solid var(--bd); border-radius:14px;
      padding:10px; position:sticky; top:86px; max-height: calc(100vh - 110px);
      overflow:auto;
    }
    .side-title{ font-size:13px; font-weight:700; margin:2px 2px 8px; }
    .side-note{ font-size:12px; color:var(--muted); margin:0 2px 10px; line-height:1.35; }
    .stats{
      display:grid; grid-template-columns:1fr 1fr; gap:8px; margin:0 0 10px;
    }
    .stat{
      border:1px solid var(--bd); border-radius:10px; padding:8px; background:#fffaf1;
    }
    .stat b{ display:block; font-size:17px; line-height:1.1; color:var(--accent); }
    .stat span{ display:block; margin-top:4px; font-size:11px; color:var(--muted); }
    #themeList{ display:grid; grid-template-columns:1fr 1fr; gap:8px; }
    .theme{
      border:1px solid var(--bd); background:#fff; color:var(--txt);
      min-height:40px; padding:8px 8px; border-radius:10px; cursor:pointer; user-select:none;
      font-size:13px; line-height:1.2; margin-bottom:0; text-align:center;
      width:100%; font-family:inherit; appearance:none; -webkit-appearance:none;
    }
    .theme:hover{ filter:brightness(0.99); }
    .theme:focus-visible{ outline:2px solid rgba(47,93,80,.28); outline-offset:2px; }
    .theme.active{ background:var(--accent); color:#fff; border-color:var(--accent); }
    .theme small{ display:none; }
    .theme-detail{
      margin-top:10px; min-height:40px; border:1px solid var(--bd); border-radius:10px;
      padding:9px 10px; background:#fffaf1; color:var(--muted); font-size:12px; line-height:1.45;
    }
    .theme-detail b{ color:var(--txt); }
    .theme-detail span{ display:block; margin-top:5px; }
    .main{ flex:1 1 auto; min-width: 700px; }

    @media (max-width: 960px){
      .topbar{ position:static; grid-template-columns:1fr; }
      .right{ justify-content:flex-start; }
      .searchbox{ min-width:100%; }
      .layout{ flex-direction:column; }
      .sidebar{
        width:100%; flex:1 1 auto; position:static; top:auto; max-height:none;
        overflow-x:auto; overflow-y:hidden;
      }
      #themeList{ display:flex; gap:8px; min-width:max-content; }
      .theme{ width:auto; margin-bottom:0; flex:0 0 auto; white-space:nowrap; }
      .theme-detail{ min-width:260px; }
      .main{ min-width:0; }
      .scroll{ max-height:calc(100vh - 260px); }
      .scroll-hint{ display:block; }
    }
    
  </style>

      supports: ["理解词语","理解句子","表达","感受","看法","经验"],
      next: ["迁移表达","真实情境","生活化习作","观点表达"]
    },

    // 9) 观察与描写链
    "观察描写": {
      explain: "从留心观察→连续观察→抓特点描写",
      core: ["观察","描写"],
      trunk: ["留心观察","仔细观察","连续观察","观察日记","静态描写","动态描写","动作","语言","神态","外貌","心理","细节"],
      supports: ["变化","特点","场景","景物","写景","人物","事物"],
      next: ["写观察日记","写景","写人","把特点写具体","动态静态结合"]
    },

    // 10) 表达与习作链
    "表达习作": {
      explain: "从说清想法→写清内容→有结构有感情地表达",
      core: ["表达","习作","写作"],
      trunk: ["写话","写日记","写清楚","围绕着一个意思写","分段表述","突出重点","列提纲","真情实感","中心意思","重点部分写具体"],
      supports: ["感受","看法","想法","交流","语言","结构","顺序","重点"],
      next: ["读后感","书信","倡议书","研究报告","策划书","作品梗概"]
    },

    // 11) 关键词句链
    "关键词句": {
      explain: "从圈出关键词句→借助证据理解段落与全文",
      core: ["关键词","关键句","关键词句"],
      trunk: ["抓住关键词句","借助关键语句","抓住关键句","关键语句","关键语句理解","概括一段话的大意"],
      supports: ["段意","概括","主要内容","思想感情","提取","理解"],
      next: ["证据意识","批注阅读","要点概括","观点提炼"]
    },

    // 12) 提问与批注链
    "提问批注": {
      explain: "从提出问题→解决问题→用批注记录思考",
      core: ["提问","问题","批注"],
      trunk: ["提出自己的问题","提出不懂的问题","试着解决","学习用批注的方法阅读","带着问题默读","从不同角度去思考"],
      supports: ["思考","理解","阅读","记录","交流","质疑"],
      next: ["问题意识","深度阅读","批注阅读","探究学习"]
    },

    // 13) 说明与介绍链
    "说明介绍": {
      explain: "从读懂说明性文章→学习说明方法→介绍事物",
      core: ["说明","介绍"],
      trunk: ["说明性文章","说明方法","基本的说明方法","介绍一种事物","把某一种事物介绍清楚","搜集资料","研究报告"],
      supports: ["资料","要点","整理","表达","事物","特点","观点"],
      next: ["说明文习作","研究报告","资料整合","清楚表达"]
    },

    // 14) 积累与运用链
    "积累运用": {
      explain: "从词句积累→语言品味→迁移到表达",
      core: ["积累","运用"],
      trunk: ["词句的积累和运用","语言的积累","积累语言","积累喜欢的语句","运用学到的词语","感受课文生动的语言"],
      supports: ["词语","句子","语言","表达","朗读","仿写"],
      next: ["迁移表达","语言运用","写话","习作"]
    }
  };


  const TAG_ALIASES = {
    "抓住关键词句": "关键词句",
    "关键语句": "关键句",
    "提取主要信息": "主要信息",
    "把握文章的主要内容": "主要内容",
    "概括一段话的大意": "概括",
    "简要复述": "复述",
    "创造性地复述": "创造性复述"
  };

  function normalizeTag(tag){
    const raw = String(tag || "").trim();
    if(!raw) return "";
    return TAG_ALIASES[raw] || raw;
  }

  // 主题词原词表：用于从 text 里补抓标签
  const THEME_TERMS = (() => {
    const s = new Set();
    for (const t of Object.values(THEMES)) {
      [...(t.core||[]), ...(t.trunk||[]), ...(t.supports||[]), ...(t.next||[])].forEach(x => s.add(String(x || "").trim()));
    }
    Object.keys(TAG_ALIASES).forEach(x => s.add(x));
    return Array.from(s).filter(Boolean).sort((a,b)=>b.length-a.length);
  })();

  function detectThemeTags(text){
    const src = String(text || "");
    const matchTags = new Set();
    const displayTags = new Set();
    THEME_TERMS.forEach(term => {
      if (term && src.includes(term)) {
        displayTags.add(term);
        matchTags.add(normalizeTag(term));
      }
    });
    return { matchTags, displayTags };
  }

  // 反向索引：点到任何一个词，都能跳到对应主题链（统一走标准化）
  const THEME_INDEX = (() => {
    const idx = {};
    for (const [name, t] of Object.entries(THEMES)) {
      [name, ...(t.core||[])].forEach(x => {
        const nx = normalizeTag(x);
        if (nx) idx[nx] = name;
      });
    }
    for (const [name, t] of Object.entries(THEMES)) {
      [...(t.trunk||[]), ...(t.supports||[]), ...(t.next||[])].forEach(x => {
        const nx = normalizeTag(x);
        if (nx && !idx[nx]) idx[nx] = name;
      });
    }
    return idx;
  })();

  function getThemeFirstCore(themeName){
    const t = THEMES[themeName];
    if(!t || !Array.isArray(t.core)) return null;
    for (const c of t.core) {
      const norm = normalizeTag(c);
      if(norm) return { raw: c, normalized: norm };
    }
    return null;
  }

  function renderThemeList(){
    const host = document.getElementById("themeList");
    if(!host) return;
    host.innerHTML = "";
    const activeThemeName = mode === "theme" && activeToken
      ? (THEME_INDEX[normalizeTag(activeToken)] || normalizeTag(activeToken))
      : null;
    const names = Object.keys(THEMES);
    names.forEach(name=>{
      const btn = document.createElement("button");
      btn.type = "button";
      const isActive = (mode === "theme" && activeThemeName === name);
      btn.className = "theme" + (isActive ? " active" : "");
      btn.setAttribute("aria-pressed", String(isActive));
      const ex = (THEMES[name] && THEMES[name].explain) ? THEMES[name].explain : "";
      btn.title = ex ? `${name}：${ex}` : name;
      btn.innerHTML = `<div>${name}</div><small>${ex}</small>`;
      btn.addEventListener("click", ()=>{
        // 点击主题：切到主题链模式，并联动；再点一次取消
        mode = "theme";
        const modeBtn = document.getElementById("modeBtn");
        if(modeBtn){
          modeBtn.textContent = "高亮：主题链";
          modeBtn.setAttribute("aria-pressed", "true");
        }
        if(activeToken === name) setActive(null, null, null);
        else setActive(name, name, "theme");
        renderThemeList();
      });
      host.appendChild(btn);
    });
    renderThemeDetail(activeThemeName);
  }

  function renderThemeDetail(themeName){
    const detail = document.getElementById("themeDetail");
    if(!detail) return;
    if(!themeName || !THEMES[themeName]){
      detail.textContent = "选择一条主题链后，这里显示链条说明。";
      return;
    }
    const t = THEMES[themeName];
    const core = (t.core || []).slice(0, 6).join("、");
    const trunk = (t.trunk || []).slice(0, 8).join("、");
    const supports = [...(t.supports || []), ...(t.next || [])].slice(0, 8).join("、");
    detail.innerHTML = `<b>${themeName}</b>：${t.explain}<span>主依据：${core || "无"}</span><span>主线词：${trunk || "无"}</span><span>辅助词：${supports || "无"}</span>`;
  }

  function renderStats(){
    const unitCount = document.getElementById("unitCount");
    const themeCount = document.getElementById("themeCount");
    if(unitCount) unitCount.textContent = String(SEMESTERS.length * UNITS.length);
    if(themeCount) themeCount.textContent = String(Object.keys(THEMES).length);
  }

  // 高亮模式：theme=主题链；word=词面
  let mode = "theme";
  let activeToken = null;   // 主题名或词（内部标准化后的 token）
  let activeKw = null;      // 记录用户最后点到的词（用于文案显示）
  let activeSource = null;  // theme | keyword | null
  let compact = false;
  let searchQuery = "";

  function normalizeSearch(s){
    return String(s || "").trim().toLowerCase();
  }

  function cellMatchesSearch(td){
    if(!searchQuery) return true;
    return normalizeSearch(td.dataset.searchText).includes(searchQuery);
  }

  function getThemeSets(token){
    // token：主题名或词
    const normalizedToken = normalizeTag(token);
    if (mode === "word") {
      const all = new Set(normalizedToken ? [normalizedToken] : []);
      return { strong: all, weak: new Set(), all };
    }
    const themeName = THEME_INDEX[normalizedToken] || normalizedToken;
    const t = THEMES[themeName];
    if (!t) {
      const all = new Set(normalizedToken ? [normalizedToken] : []);
      return { strong: all, weak: new Set(), all };
    }
    const strong = new Set([...(t.core||[]), ...(t.trunk||[])].map(normalizeTag).filter(Boolean));
    const weak = new Set([...(t.supports||[]), ...(t.next||[])].map(normalizeTag).filter(Boolean));
    const all = new Set([...strong, ...weak]);
    return { strong, weak, all, themeName };
  }

  function explainCellHit(tags, sets){
    if(!sets || !activeToken) return "";
    const strongHits = tags.filter(x => sets.strong.has(x));
    const weakHits = tags.filter(x => sets.weak.has(x) && !strongHits.includes(x));
    const hits = [...strongHits, ...weakHits].slice(0, 6);
    if(!hits.length) return "";
    return `依据：${hits.join("、")}`;
  }



  function cellId(sem, unit){ return `${sem}-${unit}`; }

  function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g, "\\$&"); }

  function highlightText(text, keywords){
    if(!keywords || keywords.length===0) return text;
    const ks = Array.from(new Set(keywords)).sort((a,b)=>b.length-a.length);
    const pattern = ks.map(k=>escRe(k)).join("|");
    if(!pattern) return text;
    const re = new RegExp(`(${pattern})`, "g");
    return text.replace(re, (m)=>`<button type="button" class="kw" data-kw="${m}" aria-pressed="false">${m}</button>`);
  }

  function renderGrid(){
    const host = document.getElementById("grid");
    const table = document.createElement("table");

    const caption = document.createElement("caption");
    caption.textContent = "小学语文要素全景图";
    table.appendChild(caption);

    const thead = document.createElement("thead");
    const trh = document.createElement("tr");

    const th0 = document.createElement("th");
    th0.textContent = "学期\\单元";
    th0.className = "sticky-left";
    th0.setAttribute("scope", "col");
    trh.appendChild(th0);

    UNITS.forEach(u=>{
      const th = document.createElement("th");
      th.textContent = u;
      th.setAttribute("scope", "col");
      trh.appendChild(th);
    });
    thead.appendChild(trh);
    table.appendChild(thead);

    const tbody = document.createElement("tbody");

    SEMESTERS.forEach(sem=>{
      const tr = document.createElement("tr");

      const th = document.createElement("th");
      th.textContent = sem;
      th.className = "sticky-left";
      th.setAttribute("scope", "row");
      tr.appendChild(th);

      UNITS.forEach(u=>{
        const td = document.createElement("td");
        const id = cellId(sem,u);
        td.dataset.cell = id;

        const cell = document.createElement("div");
        cell.className = "cell";

        const itemsWrap = document.createElement("div");
        itemsWrap.className = "items";

        const items = DATA[id] || [];
        if(items.length===0){
          const empty = document.createElement("div");
          empty.className = "item empty";
          empty.textContent = "—";
          itemsWrap.appendChild(empty);
          td.dataset.keywords = "";
          td.dataset.searchText = `${sem} ${u} ${id}`;
        }else{
          const allKw = new Set();
          const searchParts = [sem, u, id];
          items.forEach(it => {
            (it.keywords||[]).forEach(k=>allKw.add(normalizeTag(k)));
            searchParts.push(it.text, ...(it.keywords || []));
            const auto = detectThemeTags(it.text);
            auto.matchTags.forEach(t=>allKw.add(t));
            auto.displayTags.forEach(t=>searchParts.push(t));
          });
          td.dataset.keywords = Array.from(allKw).join("|");
          td.dataset.searchText = searchParts.join(" ");

          items.forEach(it=>{
            const div = document.createElement("div");
            div.className = "item";
            const displayTags = new Set([...(it.keywords||[])]);
            const auto = detectThemeTags(it.text);
            auto.displayTags.forEach(t => displayTags.add(t));
            const tagArr = Array.from(displayTags);
            div.innerHTML = highlightText(it.text, tagArr);
            itemsWrap.appendChild(div);
          });
          const reason = document.createElement("div");
          reason.className = "reason";
          reason.setAttribute("aria-label", "点亮依据");
          itemsWrap.appendChild(reason);
        }

        cell.appendChild(itemsWrap);
        td.appendChild(cell);
        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });
    table.appendChild(tbody);

    host.innerHTML = "";
    host.appendChild(table);

    const triggerKw = (rawKw)=>{
      const kw = normalizeTag(rawKw);
      if(mode === "theme"){
        const token = THEME_INDEX[kw] || kw;
        // 再点一次同一主题/词：取消
        if(activeToken === token) setActive(null, null, null);
        else setActive(token, rawKw, "keyword");
      }else{
        if(activeToken === kw) setActive(null, null, null);
        else setActive(kw, rawKw, "keyword");
      }
    };

    // keyword click (event delegation)
    table.addEventListener("click", (e)=>{
      const t = e.target;
      if(t && t.classList && t.classList.contains("kw")){
        triggerKw(t.dataset.kw);
      }
    });

    applyState();
  }

  function setActive(token, clickedKw=null, source=null){
    activeToken = token ? normalizeTag(token) : null;
    activeKw = clickedKw || activeToken;
    activeSource = activeToken ? (source || activeSource || "keyword") : null;
    applyState();
    const label = document.getElementById("activeLabel");
    if(!activeToken){
      label.textContent = "当前：全部";
      return;
    }
    const sets = getThemeSets(activeToken);
    if(mode === "theme" && sets.themeName){
      label.textContent = `当前：主题链·${sets.themeName}`;
    }else{
      label.textContent = `当前：${activeKw || activeToken}`;
    }
  }

  function applyState(){
    const sets = activeToken ? getThemeSets(activeToken) : null;
    let visibleCount = 0;

    document.querySelectorAll("td[data-cell]").forEach(td=>{
      td.classList.remove("dim","focus","focus-weak","search-hit");
      const searchMatch = cellMatchesSearch(td);
      if(searchMatch) visibleCount += 1;
      if(searchQuery && searchMatch) td.classList.add("search-hit");

      const tags = (td.dataset.keywords || "").split("|").map(normalizeTag).filter(Boolean);
      const reason = td.querySelector(".reason");
      if(reason) reason.textContent = "";
      if(sets && activeToken){
        const hitStrong = tags.some(x => sets.strong.has(x));
        const hitAny = tags.some(x => sets.all.has(x));
        const reasonText = explainCellHit(tags, sets);

        if(hitStrong) td.classList.add("focus");
        else if(hitAny) td.classList.add("focus-weak");
        else td.classList.add("dim");
        if(reason && reasonText) reason.textContent = reasonText;
      }

      if(searchQuery && !searchMatch) td.classList.add("dim");
    });

    // 关键词高亮：主题链模式下，strong 用 active（黑底），weak 用 weak（灰底）
    document.querySelectorAll(".kw").forEach(btn=>{
      btn.classList.remove("active","weak");
      btn.setAttribute("aria-pressed", "false");
      if(!sets || !activeToken) return;
      const w = normalizeTag(btn.dataset.kw);
      if(sets.strong.has(w)){
        btn.classList.add("active");
        btn.setAttribute("aria-pressed", "true");
      }else if(sets.weak.has(w)){
        btn.classList.add("weak");
      }else if(mode === "word" && w === activeToken){
        btn.classList.add("active");
        btn.setAttribute("aria-pressed", "true");
      }
    });

    document.querySelectorAll(".item").forEach(it=>{
      if(it.classList.contains("empty")) return;
      it.style.padding = compact ? "6px 8px" : "8px 10px";
      it.style.borderRadius = compact ? "10px" : "12px";
      it.style.fontSize = compact ? "12px" : "13px";
    });
    document.querySelectorAll(".reason").forEach(it=>{
      it.style.padding = compact ? "4px 6px" : "5px 7px";
      it.style.fontSize = compact ? "10px" : "11px";
    });

    const modeBtn = document.getElementById("modeBtn");
    if(modeBtn) modeBtn.setAttribute("aria-pressed", String(mode === "theme"));
    const collapseBtn = document.getElementById("collapseBtn");
    if(collapseBtn) collapseBtn.setAttribute("aria-pressed", String(compact));

    // 顶部提示文案
    const status = document.getElementById("status");
    if(!activeToken){
      status.textContent = searchQuery
        ? `搜索「${searchQuery}」：命中 ${visibleCount} 个单元。`
        : "点击任意高亮词：相关单元保持清晰，其它单元变浅；再次点击取消。";
    }else if(mode === "theme" && sets && sets.themeName){
      status.textContent = `主题链模式：以「${sets.themeName}」为中心${searchQuery ? `，搜索命中 ${visibleCount} 个单元` : "，主线更醒目，支撑与后续为虚线框"}。`;
    }else{
      status.textContent = `词面模式：只按「${activeKw || activeToken}」这个词进行联动${searchQuery ? `，搜索命中 ${visibleCount} 个单元` : ""}。`;
    }
  }

  document.getElementById("clearBtn").addEventListener("click", ()=>{
    setActive(null, null, null);
    renderThemeList();
  });

  document.getElementById("searchInput").addEventListener("input", (e)=>{
    searchQuery = normalizeSearch(e.target.value);
    applyState();
  });

  document.getElementById("searchClearBtn").addEventListener("click", ()=>{
    const input = document.getElementById("searchInput");
    input.value = "";
    searchQuery = "";
    input.focus();
    applyState();
  });

  document.getElementById("collapseBtn").addEventListener("click", ()=>{
    compact = !compact;
    applyState();
  });

  document.getElementById("modeBtn").addEventListener("click", ()=>{
    mode = (mode === "theme") ? "word" : "theme";

    if(mode === "word" && activeToken){
      if(activeSource === "theme"){
        const themeName = THEMES[activeToken] ? activeToken : (THEME_INDEX[activeToken] || null);
        const core = themeName ? getThemeFirstCore(themeName) : null;
        if(core){
          activeToken = core.normalized;
          activeKw = core.raw;
          activeSource = "keyword";
        }else{
          setActive(null, null, null);
        }
      }else if(activeKw){
        activeToken = normalizeTag(activeKw);
      }
    }

    const btn = document.getElementById("modeBtn");
    btn.textContent = mode === "theme" ? "高亮：主题链" : "高亮：词面";
    btn.setAttribute("aria-pressed", String(mode === "theme"));

    // 切换模式后重新计算高亮（保持当前选择）
    applyState();
    const label = document.getElementById("activeLabel");
    if(activeToken){
      const sets = getThemeSets(activeToken);
      if(mode === "theme" && sets.themeName) label.textContent = `当前：主题链·${sets.themeName}`;
      else label.textContent = `当前：${activeKw || activeToken}`;
    }else{
      label.textContent = "当前：全部";
    }
    renderThemeList();
  });

  renderGrid();
  renderThemeList();
  renderStats();
  applyState();
</script>
</body>
</html>
